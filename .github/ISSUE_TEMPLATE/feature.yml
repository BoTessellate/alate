name: Feature
description: New functionality
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is this feature and why do we need it?
      placeholder: Describe the feature and its value
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know when this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What this will NOT include
      placeholder: Prevents scope creep
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - normal
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - ai
    validations:
      required: true
