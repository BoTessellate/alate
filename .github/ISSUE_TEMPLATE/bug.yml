name: Bug
description: Something broken
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's broken and how does it affect users?
      placeholder: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe the issue
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual
      description: What should happen vs what happens?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - normal
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - ai
    validations:
      required: true
