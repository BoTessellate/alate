name: Chore
description: Maintenance, dependencies, docs, infra
title: "chore: "
labels: ["chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be done?
      placeholder: Describe the maintenance work
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this needed?
      placeholder: Explain the motivation
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - normal
    validations:
      required: true
