# Dependabot configuration
# Automatically creates PRs for dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "mailt"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group minor and patch updates for react ecosystem
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      # Group Next.js related packages
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
        update-types:
          - "minor"
          - "patch"
      # Group testing dependencies
      testing:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "cypress"
        update-types:
          - "minor"
          - "patch"
      # Group all other dev dependencies
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@testing-library/*"
          - "jest*"
          - "cypress"
          - "eslint*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"

  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "mailt"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group AI SDK packages
      ai-sdks:
        patterns:
          - "@anthropic-ai/*"
          - "openai"
        update-types:
          - "minor"
          - "patch"
      # Group Supabase packages
      supabase:
        patterns:
          - "@supabase/*"
        update-types:
          - "minor"
          - "patch"
      # Group Vercel packages
      vercel:
        patterns:
          - "@vercel/*"
        update-types:
          - "minor"
          - "patch"
      # Group testing dependencies
      testing:
        patterns:
          - "vitest*"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"

  # Mobile dependencies
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "mailt"
    labels:
      - "dependencies"
      - "mobile"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group Expo packages
      expo:
        patterns:
          - "expo"
          - "expo-*"
        update-types:
          - "minor"
          - "patch"
      # Group React Native packages
      react-native:
        patterns:
          - "react-native"
          - "react-native-*"
          - "@react-navigation/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
