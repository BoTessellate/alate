version: 2

# Dependabot configuration — rewritten April 2026 to reduce PR noise.
#
# Changes from the previous config:
#   - Schedule: weekly → monthly for all ecosystems. Dependabot still
#     bypasses this cadence for security advisories, so urgent patches
#     still fire immediately.
#   - Grouping: aggressive — one PR per ecosystem per update-type tier
#     (minor/patch grouped together; major bumps kept separate so they
#     get proper review).
#   - open-pull-requests-limit: 3 per ecosystem so a quiet month
#     doesn't suddenly dump 15 PRs on the queue.
#
# Auto-merge for patch + minor is handled by
# `.github/workflows/dependabot-auto-merge.yml`. Major bumps always
# require human review.

updates:
  # --- Mobile (Expo / React Native) ------------------------------------
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 3
    allow:
      - dependency-type: "production"
    groups:
      # All non-major bumps go into ONE grouped PR per month.
      mobile-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      # Major bumps stay separate so each can be reviewed individually.
      # Auto-merge skips these (see workflow).
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # --- Backend (Node / Vercel) -----------------------------------------
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 3
    allow:
      - dependency-type: "production"
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # --- GitHub Actions --------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
