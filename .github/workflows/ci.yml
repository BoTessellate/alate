name: CI

# Test gate for every PR into master. Branch protection REQUIRES the
# `mobile` and `backend` checks below to pass before a PR can merge —
# including Dependabot auto-merges. If a dependency bump breaks the
# type-check or the tests, this fails and the PR will NOT merge.
#
# Runs on `pull_request` (not pull_request_target) so Dependabot PRs
# get a read-only token and no secrets — the test suites need neither.

on:
  pull_request:
    branches: [master]

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Jest
        run: npx jest --no-coverage --ci

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Vitest
        run: npx vitest run
