# Code Quality Checks
# Runs on PRs to main/master branch
# Only runs relevant checks based on what files changed

name: Code Quality

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ============================================================================
  # Change Detection - Determines which checks to run
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      commit-type: ${{ steps.commit.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect commit type
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
          else
            TITLE=$(git log -1 --pretty=%B)
          fi

          TYPE="unknown"
          if echo "$TITLE" | grep -qiE "^feat(\(.*\))?:"; then TYPE="feat"
          elif echo "$TITLE" | grep -qiE "^fix(\(.*\))?:"; then TYPE="fix"
          elif echo "$TITLE" | grep -qiE "^chore(\(.*\))?:"; then TYPE="chore"
          elif echo "$TITLE" | grep -qiE "^docs(\(.*\))?:"; then TYPE="docs"
          elif echo "$TITLE" | grep -qiE "^refactor(\(.*\))?:"; then TYPE="refactor"
          elif echo "$TITLE" | grep -qiE "^test(\(.*\))?:"; then TYPE="test"
          elif echo "$TITLE" | grep -qiE "^ci(\(.*\))?:"; then TYPE="ci"
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "Commit type: $TYPE"

      - name: Check for file changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Check backend changes
          if echo "$CHANGED" | grep -qE "^backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          # Check frontend changes
          if echo "$CHANGED" | grep -qE "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Backend Checks - Only run when backend files change
  # ============================================================================
  backend-typecheck:
    name: Backend TypeScript Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (API and critical files)
        run: npx tsc --project tsconfig.ci.json

  backend-critical-patterns:
    name: Backend Critical Pattern Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Check for double .text() calls on Response objects
        run: |
          echo "Checking for potential double .text() calls..."
          if grep -rn "\.text()" api/ sdk/ --include="*.ts" | grep -v "tokenResponseText" | grep -c "await.*\.text().*await.*\.text()" > /dev/null 2>&1; then
            echo "WARNING: Potential double .text() call detected. Review carefully."
          fi
          echo "Pattern check complete."

      - name: Check X-Frame-Options not re-added to Shopify endpoint
        run: |
          echo "Checking X-Frame-Options is not set for Shopify..."
          if grep -n "setHeader.*X-Frame-Options" api/shopify.ts > /dev/null 2>&1; then
            echo "ERROR: X-Frame-Options header is being SET in shopify.ts!"
            exit 1
          fi
          echo "X-Frame-Options check passed."

      - name: Check timeout exists in secureAI
        run: |
          echo "Checking AbortController timeout exists..."
          if ! grep -q "AbortController" sdk/shared/secureAI.ts; then
            echo "ERROR: AbortController timeout removed from secureAI.ts!"
            exit 1
          fi
          echo "Timeout check passed."

      - name: Check Anthropic fallback exists
        run: |
          echo "Checking Anthropic direct API fallback exists..."
          if ! grep -q "callAnthropicDirect" sdk/shared/secureAI.ts; then
            echo "ERROR: Anthropic direct API fallback removed!"
            exit 1
          fi
          echo "Anthropic fallback check passed."

      - name: Count API functions (max 12 for Hobby plan)
        run: |
          echo "Counting API functions..."
          count=$(ls -1 api/*.ts 2>/dev/null | wc -l)
          echo "Current count: $count / 12"
          if [ "$count" -gt 12 ]; then
            echo "ERROR: Too many API functions ($count > 12)!"
            exit 1
          fi
          echo "Function count check passed."

  # Skip marker for backend (shows as passed when skipped)
  backend-skipped:
    name: Backend TypeScript Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skipped (no backend changes)
        run: echo "✓ Skipped - no backend files changed"

  # ============================================================================
  # Frontend Checks - Only run when frontend files change
  # ============================================================================
  frontend-typecheck:
    name: Frontend TypeScript Check
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --project tsconfig.ci.json

  frontend-build:
    name: Frontend Build Check
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://backend-tml.vercel.app

  # Skip marker for frontend (shows as passed when skipped)
  frontend-skipped:
    name: Frontend TypeScript Check
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skipped (no frontend changes)
        run: echo "✓ Skipped - no frontend files changed"
