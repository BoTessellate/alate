name: Build Android APK

# Reduced-frequency triggers (April 2026 CI cleanup):
#   - workflow_dispatch: manual runs via the UI, for ad-hoc builds
#   - schedule (weekly Monday 04:00 UTC): one scheduled build per week
#     gives you a known-good "today" APK without firing on every push
#   - push on release tags (v*): every tagged release produces an APK
#     + triggers the guinea-pig E2E suite
#
# We do NOT run on every master push anymore — it was firing multiple
# times per day, mostly producing a failing run because the
# google-services.json wasn't in CI. Now it runs intentionally.

on:
  workflow_dispatch:
  schedule:
    # Monday 04:00 UTC — quiet window, outside Indian business hours.
    - cron: '0 4 * * 1'
  push:
    tags:
      - 'v*'

# Cancel any in-flight run when a new one supersedes it. Saves compute
# when a manual trigger happens twice in quick succession.
concurrency:
  group: build-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      # Restore the Firebase config from a GitHub secret before prebuild.
      # google-services.json is gitignored (it holds private keys), so
      # CI needs this decode step or `expo prebuild` fails with ENOENT.
      #
      # To populate the secret locally:
      #   [Convert]::ToBase64String([IO.File]::ReadAllBytes(
      #     "C:\Users\you\...\mobile\google-services.json"
      #   )) | Set-Clipboard
      # Then: GitHub → Settings → Secrets → Actions → New secret
      #   Name: GOOGLE_SERVICES_JSON_B64
      #   Value: (paste)
      - name: Restore google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_B64 secret is missing."
            echo "Add it to GitHub Actions secrets before running this workflow."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > google-services.json
          echo "google-services.json restored ($(wc -c < google-services.json) bytes)"

      - name: Set Android versionCode from the build run number
        # app.json deliberately pins no `android.versionCode`, so Expo
        # prebuild emits `versionCode 1` on every build — and Play
        # Console rejects re-uploading an already-seen code ("version 1
        # is already taken", plus the "no upgrade path" / "no new app
        # bundle" errors that cascade from it). github.run_number is
        # unique and monotonically increasing per workflow run, so
        # injecting it into app.json BEFORE prebuild gives every build a
        # fresh, higher code with zero manual bumps. Written into
        # app.json (not the generated build.gradle) so Expo stays the
        # single source of truth for the Android manifest. The edit is
        # ephemeral — it lives only in this CI checkout, never committed.
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json'));j.expo.android=j.expo.android||{};j.expo.android.versionCode=${{ github.run_number }};fs.writeFileSync('app.json',JSON.stringify(j,null,2)+'\n');"
          echo "Android versionCode set to ${{ github.run_number }}"

      - name: Expo prebuild
        # All EXPO_PUBLIC_* vars must be present at this step (and at
        # the gradle build below) — babel-preset-expo inlines them at
        # compile time. Without these, the runtime sees `undefined` and
        # the Google sign-in path renders the "Not configured" toast.
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}

      - name: Remove hermesCommand (hermes-compiler not in node_modules, breaks path resolution)
        run: sed -i '/hermesCommand/d' android/app/build.gradle

      - name: Patch MainApplication.kt (Expo 54 prebuild template omits reactNativeHost, required by RN 0.81)
        run: cp patches/MainApplication.kt android/app/src/main/java/com/tessellate/alate/MainApplication.kt

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup release signing keystore
        # Restore the release/upload keystore from secrets, and FAIL
        # CLOSED if any signing secret is missing. The old version had
        # an `else` branch that, on a missing ANDROID_KEYSTORE,
        # generated a throwaway keystore, signed it with a hardcoded
        # password, and printed the key (base64) straight into the
        # build log. That leaks the signing key the instant the repo is
        # public — and the artifact is useless anyway (Play Console
        # rejects an AAB signed with an unrecognised key). Bootstrapping
        # a NEW upload keystore is a deliberate, local, one-off action;
        # CI must never do it silently. Incident: 2026-04, two runs
        # leaked a keystore this way — see anti-pattern #19.
        #
        # Secrets are read via `env:`, never inlined as `${{ }}` in the
        # script body, so a shell trace cannot surface the value.
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=
          if [ -z "$ANDROID_KEYSTORE" ];  then missing="$missing ANDROID_KEYSTORE"; fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then missing="$missing KEYSTORE_PASSWORD"; fi
          if [ -z "$KEY_PASSWORD" ];      then missing="$missing KEY_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required signing secret(s):$missing"
            echo "::error::Set them under Settings → Secrets and variables → Actions. CI does not generate keystores."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE" | base64 -d > android/app/alate-release.keystore
          echo "Release keystore restored from secret ($(wc -c < android/app/alate-release.keystore) bytes)"

      - name: Patch build.gradle to use release keystore
        # Passwords come straight from secrets — no hardcoded fallback.
        # The old 'alate_dev_2024' default that lived here was a public,
        # guessable signing password (anti-pattern #19). The keystore
        # step above already fails the build if these secrets are
        # absent, so they are guaranteed present by this point.
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat >> android/app/build.gradle << EOF

          android.signingConfigs {
            release {
              storeFile = file("alate-release.keystore")
              storePassword = "$KEYSTORE_PASSWORD"
              keyAlias = "alate"
              keyPassword = "$KEY_PASSWORD"
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF

      - name: Build release APK + AAB
        # The EXPO_PUBLIC_* vars must ALSO be present here — Gradle
        # invokes the JS bundler internally during assembleRelease,
        # and that's where babel-preset-expo inlines the env reads
        # into the Hermes bytecode. Setting them only on prebuild is
        # not enough.
        #
        # Two artifacts produced in one gradle session (saves ~2 min vs
        # running them as separate steps):
        #   - assembleRelease → app-release.apk      (sideload-ready)
        #   - bundleRelease   → app-release.aab      (Play Console upload)
        # Play Store has required AAB for new app submissions since Aug
        # 2021. APK is kept for sideloading onto a Pixel for QA.
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: alate-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload AAB (Play Console)
        # Play Console requires .aab for new app submissions (mandatory
        # since Aug 2021). Download from the workflow run's Artifacts
        # panel, then upload to Play Console under
        #   Production → Create new release → Upload bundle.
        uses: actions/upload-artifact@v7
        with:
          name: alate-release.aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Trigger guinea-pig E2E suite
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GUINEA_PIG_DISPATCH_TOKEN }}
          repository: BoTessellate/guinea-pig
          event-type: alate-apk-ready
          client-payload: '{"run_id": "${{ github.run_id }}", "sha": "${{ github.sha }}"}'
