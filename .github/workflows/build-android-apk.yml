name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Patch sentry.gradle exec() for Gradle 8.8+ compatibility
        run: sed -i 's/\bexec {/project.exec {/g' node_modules/@sentry/react-native/sentry.gradle

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Remove hermesCommand (not needed in RN 0.73+, breaks CI path resolution)
        run: sed -i '/hermesCommand/d' android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: alate-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
