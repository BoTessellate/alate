name: Mobile App Tests

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'mobile/**'

jobs:
  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mobile/coverage/

  # E2E tests use Maestro and require a running device/emulator.
  # Run locally: cd mobile && npm run test:e2e
  # For CI, consider Maestro Cloud (https://cloud.mobile.dev) or
  # running on a self-hosted runner with an Android emulator.

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
