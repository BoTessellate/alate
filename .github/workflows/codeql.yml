name: CodeQL

# This replaces GitHub's default CodeQL setup to stop scanning on every
# PR push. Default setup fires on every PR + every commit, which at this
# project's scale produces 4+ runs per PR cycle. Switching to advanced
# setup with `push: master` + weekly schedule drops PR-push scanning
# entirely while keeping drift-detection via the weekly cron and gating
# every master merge.
#
# If you want to re-enable PR scanning later, add `pull_request` back
# to the `on:` block — but the recommendation is to scan at merge time
# (push to master) rather than during development iteration.

on:
  push:
    branches: [master]
  schedule:
    # Every Friday 12:00 UTC — catches drift if nothing lands in a week.
    - cron: '0 12 * * 5'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Use GitHub-maintained queries only. Custom queries would
          # live under `.github/codeql/` if we ever need them.
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
