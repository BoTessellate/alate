name: Vercel production deploy

# Replaces Vercel's native GitHub integration. Vercel Hobby doesn't
# support auto-deploy from private org repos (BoTessellate/alate_private),
# and we don't want to upgrade to Pro just for that. This workflow
# uses the Vercel CLI with VERCEL_TOKEN to deploy directly, bypassing
# the GitHub-Vercel link entirely.
#
# Triggers — intentionally narrow to keep Hobby quotas unstressed:
#   - push to master that touches `backend/**` (or this workflow file)
#   - manual via the Actions UI for one-off deploys
#   - release tags (`v*`) for explicit version cuts
#
# What we deliberately DON'T do:
#   - Preview deploys on PRs (saves serverless invocations on Hobby)
#   - Deploy on mobile-only changes (no point — mobile doesn't ship via Vercel)
#   - Deploy on docs/.github/.cursor changes (excluded by path filter)
#
# Required GitHub secrets:
#   VERCEL_TOKEN       — personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID      — team_r81T3EIQNIP4XuLOVJDT3Bjt
#   VERCEL_PROJECT_ID  — prj_5zp0PkK7pHC37apVaAB7QQQDm0wv

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/vercel-deploy.yml'
    tags:
      - 'v*'

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: do NOT set `working-directory: backend` here. The Vercel
    # project is configured with `Root Directory = backend` in its
    # dashboard settings, and `vercel pull` rehydrates that into
    # `.vercel/project.json`. If we also `cd backend` before invoking
    # the CLI, the rootDirectory gets applied a SECOND time → the CLI
    # looks for the project at `<repo>/backend/backend` and bails
    # ("provided path does not exist"). Every backend deploy from
    # 2026-04-25 through 2026-05-02 failed this way. Run from the
    # repo root and let Vercel's project settings handle the chase.

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
