# GitHub Labels Configuration
# Run `gh label create` commands below to set up labels, or use the sync-labels workflow

# Type labels
- name: feature
  color: "0E8A16"
  description: "New functionality"

- name: bug
  color: "D73A4A"
  description: "Something isn't working"

- name: enhancement
  color: "A2EEEF"
  description: "Improvement to existing functionality"

- name: refactor
  color: "7057FF"
  description: "Code restructuring without behavior change"

- name: chore
  color: "FEF2C0"
  description: "Maintenance, dependencies, config"

- name: docs
  color: "0075CA"
  description: "Documentation updates"

# Priority labels
- name: critical
  color: "B60205"
  description: "Production-breaking, fix immediately"

- name: high
  color: "D93F0B"
  description: "Important, fix soon"

- name: medium
  color: "FBCA04"
  description: "Normal priority"

- name: low
  color: "C2E0C6"
  description: "Nice to have"

# Area labels
- name: frontend
  color: "1D76DB"
  description: "Frontend/UI work"

- name: backend
  color: "5319E7"
  description: "Backend/API work"

- name: ai
  color: "BFDADC"
  description: "AI/ML related"

- name: ui
  color: "D4C5F9"
  description: "Visual/design changes"

- name: data-quality
  color: "F9D0C4"
  description: "Data integrity issues"

- name: infra
  color: "E4E669"
  description: "Infrastructure/CI/CD"

# Status labels
- name: in-progress
  color: "EDEDED"
  description: "Work in progress"

- name: blocked
  color: "B60205"
  description: "Waiting on external dependency"

- name: needs-review
  color: "0E8A16"
  description: "Ready for code review"

- name: repeat-issue
  color: "D73A4A"
  description: "Issue that has recurred"
